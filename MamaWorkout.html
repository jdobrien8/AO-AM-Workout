<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong & Steady — Dumbbell Training</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6F9;
    --warm-white: #FFF9FB;
    --sage: #C9A0C0;
    --sage-dark: #8E5A8A;
    --sage-light: #E8D0E5;
    --rust: #D4748B;
    --rust-light: #E89DB0;
    --charcoal: #3A2A35;
    --mid-grey: #7A6070;
    --light-border: #EDCFDB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── HOME SCREEN ── */
  #home {
    background: var(--warm-white);
  }

  .home-header {
    background: linear-gradient(135deg, #3D1F35 0%, #5C2D4E 100%);
    color: var(--cream);
    padding: 48px 32px 36px;
    position: relative;
    overflow: hidden;
  }

  .home-header::before { display: none; }
  .home-header::after { display: none; }

  .home-header .geo-lines {
    position: absolute;
    bottom: 0; left: 0; right: 0; top: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .home-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    position: relative;
  }

  .home-header p {
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--sage-light);
    letter-spacing: 0.04em;
    position: relative;
  }

  .program-tag {
    display: inline-block;
    margin-top: 18px;
    background: var(--rust);
    color: white;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    position: relative;
  }

  .day-grid {
    padding: 28px 20px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .day-card {
    background: var(--cream);
    border: 1.5px solid var(--light-border);
    border-radius: 14px;
    padding: 20px 18px;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
  }

  .day-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--sage);
    transform: scaleX(0);
    transition: transform 0.22s ease;
    transform-origin: left;
  }

  .day-card:hover {
    border-color: var(--rust);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  .day-card:hover::after { transform: scaleX(1); }

  .day-card.done {
    border-color: var(--rust);
    background: #FDF0F4;
  }

  .day-card.done::after { transform: scaleX(1); background: var(--rust); }

  .day-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 6px;
  }

  .day-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.25;
  }

  .day-focus {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--mid-grey);
    font-weight: 400;
  }

  .day-moves {
    margin-top: 10px;
    font-size: 0.72rem;
    color: var(--sage-dark);
    font-weight: 500;
  }

  .done-badge {
    position: absolute;
    top: 10px; right: 10px;
    font-size: 1rem;
  }

  .reset-btn {
    display: block;
    margin: 0 20px 20px;
    text-align: center;
    padding: 10px;
    border: 1.5px solid var(--light-border);
    border-radius: 8px;
    background: none;
    color: var(--mid-grey);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--rust); color: var(--rust); }

  /* ── WORKOUT SCREEN ── */
  #workout {
    background: linear-gradient(160deg, #2E1428 0%, #4A2040 100%);
    color: var(--cream);
    position: relative;
  }

  #workout::before { display: none; }
  #workout::after { display: none; }

  .workout-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 24px 20px 0;
  }

  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: var(--cream);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }

  .back-btn:hover { background: rgba(255,255,255,0.2); }

  .workout-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }

  .workout-subtitle {
    font-size: 0.78rem;
    color: var(--sage-light);
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-track {
    margin: 20px 20px 0;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--rust-light);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .exercise-steps {
    display: flex;
    gap: 5px;
    padding: 10px 20px 0;
  }

  .step-dot {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.15);
    transition: background 0.3s;
  }

  .step-dot.done { background: var(--sage); }
  .step-dot.active { background: var(--rust-light); }

  /* Main exercise display */
  .exercise-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
    text-align: center;
  }

  .phase-badge {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  .phase-badge.exercise { background: var(--rust); color: white; letter-spacing: 0.05em; }

  .phase-badge.warmup { background: rgba(255,255,255,0.15); color: var(--cream); }
  .phase-badge.done { background: var(--sage); color: white; }
  .phase-badge.core-badge { background: var(--sage-dark); color: white; }

  .type-chip {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .step-dot.core { background: rgba(201,160,192,0.45); }
  .step-dot.core.done { background: var(--sage); }
  .step-dot.core.active { background: var(--sage-light); }

  .exercise-icon {
    font-size: 4.5rem;
    margin-bottom: 16px;
    animation: pulse 2s ease-in-out infinite;
    line-height: 1;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }




  .exercise-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .exercise-cue {
    font-size: 0.92rem;
    color: var(--sage-light);
    font-weight: 300;
    max-width: 280px;
    line-height: 1.5;
    margin-bottom: 28px;
  }



  .rep-display {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--cream);
  }

  .rep-display span {
    color: var(--rust-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 900;
  }

  /* Controls */
  .workout-controls {
    padding: 0 20px 36px;
    display: flex;
    gap: 12px;
  }

  .ctrl-btn {
    flex: 1;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn.primary {
    background: var(--rust);
    color: white;
    flex: 2;
  }

  .ctrl-btn.primary:hover { background: var(--rust-light); }

  .ctrl-btn.secondary {
    background: rgba(255,255,255,0.1);
    color: var(--cream);
  }

  .ctrl-btn.secondary:hover { background: rgba(255,255,255,0.18); }

  .ctrl-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Next up preview */
  .next-up {
    margin: 0 20px 16px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    border-left: 3px solid var(--sage);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .next-up-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage-light);
  }

  .next-up-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--cream);
  }

  /* Done screen */
  #done-screen {
    background: linear-gradient(160deg, #2E1428 0%, #4A2040 100%);
    color: var(--cream);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 28px;
    gap: 20px;
  }

  .done-trophy { font-size: 5rem; }

  .done-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 900;
    line-height: 1.1;
  }

  .done-subtitle {
    color: var(--sage-light);
    font-size: 1rem;
    font-weight: 300;
  }

  .done-stats {
    display: flex;
    gap: 24px;
    margin: 8px 0;
  }

  .done-stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .done-stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--rust-light);
  }

  .done-stat-label {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--sage-light);
  }

  .done-btn {
    width: 100%;
    max-width: 320px;
    padding: 18px;
    border-radius: 6px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .done-btn.primary { background: var(--rust); color: white; }
  .done-btn.secondary { background: rgba(255,255,255,0.1); color: var(--cream); margin-top: 4px; }

  /* Animations */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in { animation: slideUp 0.35s ease forwards; }

  /* ── EXERCISE LIST (scrollable workout view) ── */
  .done-count {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--sage-light);
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .exercise-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ex-card {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .ex-card:active { transform: scale(0.98); }

  .ex-card.checked {
    background: rgba(201,160,192,0.15);
    border-color: var(--sage);
    opacity: 0.6;
  }

  .ex-card.core-card {
    border-color: rgba(142,90,138,0.4);
    background: rgba(142,90,138,0.1);
  }

  .ex-card.core-card.checked {
    background: rgba(142,90,138,0.2);
    border-color: var(--sage-dark);
  }

  .ex-check {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: all 0.2s;
    margin-top: 2px;
    background: transparent;
  }

  .ex-card.checked .ex-check {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }

  .ex-card.core-card .ex-check {
    border-color: rgba(201,160,192,0.5);
  }

  .ex-body { flex: 1; }

  .ex-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .ex-icon-sm { font-size: 1.1rem; line-height: 1; }

  .ex-name-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
  }

  .ex-card.checked .ex-name-text {
    text-decoration: line-through;
    color: rgba(253,246,249,0.45);
  }

  .ex-type-pill {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.5);
    margin-left: auto;
    white-space: nowrap;
  }

  .ex-type-pill.core-pill {
    border-color: rgba(201,160,192,0.4);
    color: var(--sage-light);
  }

  .ex-reps {
    font-size: 0.82rem;
    color: var(--rust-light);
    font-weight: 600;
  }

  .ex-cue {
    font-size: 0.78rem;
    color: rgba(253,246,249,0.55);
    font-weight: 300;
    line-height: 1.5;
    margin-top: 4px;
  }

  .ex-card.checked .ex-cue {
    color: rgba(253,246,249,0.25);
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage-light);
    padding: 4px 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  .finish-bar {
    padding: 12px 16px 28px;
  }

  .finish-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background: var(--rust);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.02em;
  }

  .finish-btn:hover { background: var(--rust-light); }

</style>
</head>

  <div class="day-grid" id="dayGrid"></div>

      <div class="workout-title" id="wTitle"></div>

  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>

  </div>

  </div>
</div>

  <div class="done-title">Workout<br>Complete!</div>
  <div class="done-subtitle" id="doneSubtitle"></div>

    <div class="done-stat">
      <div class="done-stat-num" id="doneMoves">0</div>
      <div class="done-stat-label">Exercises</div>
    </div>
    <div class="done-stat">
      <div class="done-stat-num">15</div>
      <div class="done-stat-label">Minutes</div>

let currentWorkout = null;

let completedWorkouts = JSON.parse(localStorage.getItem('ss_done') || '[]');

// ── HOME ──────────────────────────────────────────────────────────
function buildHome() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  WORKOUTS.forEach(w => {
    const done = completedWorkouts.includes(w.id);
    const card = document.createElement('div');
    card.className = `day-card${done ? ' done' : ''}`;
    const coreCount = w.exercises.filter(e => e.isCore).length;
    const compoundCount = w.exercises.filter(e => !e.isCore).length;
    card.innerHTML = `
      ${done ? '<div class="done-badge">✅</div>' : ''}
      <div class="day-label">${w.day} · ${w.tag}</div>
      <div class="day-name">${w.icon} ${w.name}</div>
      <div class="day-focus">${w.focus}</div>
      <div class="day-moves">${compoundCount} compound + <span style="color:var(--sage-dark);font-weight:600">${coreCount} core</span></div>
    `;
    card.onclick = () => startWorkout(w.id);
    grid.appendChild(card);
  });
}

function resetProgress() {
  if (confirm('Reset all workout progress?')) {
    completedWorkouts = [];
    localStorage.removeItem('ss_done');
    buildHome();
  }
}

function goHome() {
  clearInterval(timerInterval);
  timerInterval = null;
  showScreen('home');
  buildHome();
}

// ── WORKOUT ───────────────────────────────────────────────────────
let checkedSteps = new Set();

function startWorkout(id) {
  currentWorkout = WORKOUTS.find(w => w.id === id);
  checkedSteps = new Set();

  document.getElementById('wTitle').textContent = `${currentWorkout.icon} ${currentWorkout.name}`;
  document.getElementById('wSubtitle').textContent = currentWorkout.focus;

  buildExerciseList();
  updateProgress();
  document.getElementById('finishBar').style.display = 'none';
  showScreen('workout');
}

function buildExerciseList() {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  const exercises = currentWorkout.exercises;
  let lastWasCore = null;

  exercises.forEach((ex, i) => {
    const isCore = !!ex.isCore;

    if (isCore && lastWasCore === false) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = '✾ Core';
      list.appendChild(lbl);
    } else if (!isCore && lastWasCore === null) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = 'Compound moves';
      list.appendChild(lbl);
    }
    lastWasCore = isCore;

    const card = document.createElement('div');
    card.className = `ex-card${isCore ? ' core-card' : ''}`;
    card.id = `ex-card-${i}`;
    card.onclick = () => toggleCheck(i);

    const typeLabel = isCore ? 'Core' : ex.type.charAt(0).toUpperCase() + ex.type.slice(1);
    const repStr = `${ex.reps} ${ex.note || 'reps'}`;

    card.innerHTML = `
      <div class="ex-check" id="ex-check-${i}"></div>
      <div class="ex-body">
        <div class="ex-top-row">
          <span class="ex-icon-sm">${ex.icon}</span>
          <span class="ex-name-text" id="ex-name-${i}">${ex.name}</span>
          <span class="ex-type-pill${isCore ? ' core-pill' : ''}">${typeLabel}</span>
        </div>
        <div class="ex-reps">${repStr}</div>
        <div class="ex-cue">${ex.cue}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

function toggleCheck(i) {
  if (checkedSteps.has(i)) {
    checkedSteps.delete(i);
  } else {
    checkedSteps.add(i);
  }
  const card = document.getElementById(`ex-card-${i}`);
  const check = document.getElementById(`ex-check-${i}`);
  if (checkedSteps.has(i)) {
    card.classList.add('checked');
    check.textContent = '✓';
  } else {
    card.classList.remove('checked');
    check.textContent = '';
  }
  updateProgress();
  const total = currentWorkout.exercises.length;
  const finishBar = document.getElementById('finishBar');
  if (checkedSteps.size === total) {
    finishBar.style.display = 'block';
    finishBar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    finishBar.style.display = 'none';
  }
}

function updateProgress() {
  const total = currentWorkout.exercises.length;
  const done = checkedSteps.size;
  document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;
  document.getElementById('doneCount').textContent = `${done} / ${total}`;
}

function finishWorkout() {
  if (!completedWorkouts.includes(currentWorkout.id)) {
    completedWorkouts.push(currentWorkout.id);
    localStorage.setItem('ss_done', JSON.stringify(completedWorkouts));
  }
  const totalReps = currentWorkout.exercises.reduce((s, e) => s + e.reps, 0);
  const compoundMoves = currentWorkout.exercises.filter(e => !e.isCore).length;
  document.getElementById('doneSubtitle').textContent = currentWorkout.name + ' · Great work!';
  document.getElementById('doneMoves').textContent = compoundMoves;
  document.getElementById('doneReps').textContent = totalReps + '+';
  showScreen('done-screen');
}

function restartWorkout() {
  startWorkout(currentWorkout.id);
}

// ── SCREEN ROUTER ─────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── INIT ──────────────────────────────────────────────────────────
